<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Sequence → GIF</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    margin-bottom: 10px;
}

#topbar {
    display: flex;
    align-items: center;
    gap: 20px;
}

#trash {
    font-size: 28px;
    cursor: pointer;
    background: white;
    border: 2px dashed #ccc;
    padding: 10px 15px;
    border-radius: 10px;
    transition: 0.2s;
}

#trash.active {
    background: #ffdddd;
    border-color: red;
}

#preview {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: white;
    border: 1px solid #ddd;
    margin-top: 15px;
}

.thumb {
    height: 100px;
    cursor: grab;
}

.controls {
    margin-top: 20px;
}

input {
    padding: 5px;
    width: 80px;
}

button {
    padding: 10px 15px;
    margin-top: 15px;
    cursor: pointer;
}

#status {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>Image Sequence → GIF</h1>

<div id="topbar">
    <input type="file" id="upload" multiple accept="image/*">
    <div id="trash">🗑️</div>
</div>

<div id="preview"></div>

<div class="controls">
    <label>FPS:</label>
    <input type="number" id="fps" value="2" min="1">
    <span id="duration"></span>
</div>

<button id="export">Export GIF</button>

<div id="status"></div>

<script>
let images = [];

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const fpsInput = document.getElementById("fps");
const durationText = document.getElementById("duration");
const status = document.getElementById("status");
const trash = document.getElementById("trash");

upload.addEventListener("change", (e) => {
    const files = Array.from(e.target.files);

    files.sort((a, b) => a.name.localeCompare(b.name));

    images = [];
    preview.innerHTML = "";

    files.forEach(file => {
        const img = document.createElement("img");
        img.className = "thumb";
        img.src = URL.createObjectURL(file);

        preview.appendChild(img);
        images.push(img);
    });

    updateDuration();
});

// SORTABLE (drag reorder)
new Sortable(preview, {
    animation: 150,
    onEnd: () => {
        images = Array.from(preview.children);
        updateDuration();
    }
});

// FPS
fpsInput.addEventListener("input", updateDuration);

function updateDuration() {
    const fps = parseFloat(fpsInput.value) || 1;
    const duration = images.length / fps;
    durationText.textContent = ` | Duration: ${duration.toFixed(2)}s`;
}

// 🗑️ CLICK → DELETE ALL
trash.addEventListener("click", () => {
    if (images.length === 0) return;

    if (confirm("Delete all images?")) {
        preview.innerHTML = "";
        images = [];
        updateDuration();
    }
});

// 🗑️ DRAG TO DELETE
preview.addEventListener("dragstart", (e) => {
    if (e.target.classList.contains("thumb")) {
        e.dataTransfer.setData("text/plain", "image");
        e.target.classList.add("dragging");
    }
});

preview.addEventListener("dragend", (e) => {
    if (e.target.classList.contains("thumb")) {
        e.target.classList.remove("dragging");
        trash.classList.remove("active");
    }
});

trash.addEventListener("dragover", (e) => {
    e.preventDefault();
    trash.classList.add("active");
});

trash.addEventListener("dragleave", () => {
    trash.classList.remove("active");
});

trash.addEventListener("drop", (e) => {
    e.preventDefault();
    const dragging = document.querySelector(".dragging");

    if (dragging) {
        dragging.remove();
        images = Array.from(preview.children);
        updateDuration();
    }

    trash.classList.remove("active");
});

// EXPORT
document.getElementById("export").addEventListener("click", () => {
    if (images.length === 0) {
        alert("Upload images first");
        return;
    }

    const fps = parseFloat(fpsInput.value) || 1;
    const delay = 1000 / fps;

    status.textContent = "Rendering GIF...";

    const gif = new GIF({
        workers: 2,
        quality: 10
    });

    let loaded = 0;

    images.forEach(img => {
        const temp = new Image();
        temp.src = img.src;

        temp.onload = () => {
            gif.addFrame(temp, { delay });

            loaded++;
            if (loaded === images.length) {
                gif.render();
            }
        };
    });

    gif.on("finished", blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "output.gif";
        a.click();

        status.textContent = "Done!";
    });
});
</script>

</body>
</html>
